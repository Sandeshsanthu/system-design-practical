name: Build and Push to Docker Hub

on:
  push:
    branches: [ "main" ]
    paths:
      - 'pdf-generator/**' # Only runs if changes occur in this folder

jobs:
  # GUARDRAIL 1: Scan for secrets before doing anything
  security-scan:
    name: Secret Guardrail Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog OSS
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.before }}
          head: ${{ github.sha }}
          extra_args: --only-verified

  # JOB 2: Build and Push if scan passes
  build-and-push:
    name: Docker Build & Push
    needs: security-scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: ./pdf-generator # Focus build on your sub-directory
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/pdf-generator:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/pdf-generator:${{ github.sha }}
