# Code Generated by Sidekick is for learning and experimentation purposes only.
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: pdf-worker-scaler
  namespace: pdf-generator
spec:
  scaleTargetRef:
    name: pdf-worker
  pollingInterval: 15  # Check every 15 seconds
  cooldownPeriod: 300  # Wait 5 minutes before scaling down
  minReplicaCount: 1   # Minimum number of workers
  maxReplicaCount: 20  # Maximum number of workers
  triggers:
  - type: redis
    metadata:
      addressFromEnv: REDIS_HOST
      portFromEnv: REDIS_PORT
      listName: pdf_queue  # Your Redis list/queue name
      listLength: "5"      # Target: 5 items per worker
      databaseIndex: "0"
      # For password-protected Redis (if using auth)
      # passwordFromEnv: REDIS_PASSWORD
---
# Alternative: Scale based on Redis Stream
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: pdf-worker-stream-scaler
  namespace: pdf-generator
spec:
  scaleTargetRef:
    name: pdf-worker
  pollingInterval: 15
  cooldownPeriod: 300
  minReplicaCount: 1
  maxReplicaCount: 20
  triggers:
  - type: redis-streams
    metadata:
      addressFromEnv: REDIS_HOST
      portFromEnv: REDIS_PORT
      stream: pdf_stream        # Your Redis stream name
      consumerGroup: pdf_workers
      pendingEntriesCount: "5"  # Target: 5 pending entries per worker
