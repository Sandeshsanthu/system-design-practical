# Code Generated by Sidekick is for learning and experimentation purposes only.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: worker-sa
  namespace: pdf-generator
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT_ID:role/pdf-generator-cluster-worker-role  # Update from Terraform output
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pdf-worker
  namespace: pdf-generator
  labels:
    app: pdf-worker
spec:
  replicas: 2  # Initial replicas, KEDA will manage scaling
  selector:
    matchLabels:
      app: pdf-worker
  template:
    metadata:
      labels:
        app: pdf-worker
    spec:
      serviceAccountName: worker-sa
      tolerations:
      - key: "workload"
        operator: "Equal"
        value: "worker"
        effect: "NoSchedule"
      nodeSelector:
        role: worker
      containers:
      - name: worker
        image: sandeshs/pdf-generator:latest
        command: ["python", "-u", "worker.py"]
        env:
        - name: PYTHONUNBUFFERED
          value: "1"
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: DATABASE_URL
        - name: REDIS_HOST
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: REDIS_HOST
        - name: REDIS_PORT
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: REDIS_PORT
        - name: BUCKET_NAME
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: BUCKET_NAME
        - name: AWS_DEFAULT_REGION
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: AWS_DEFAULT_REGION
        # AWS credentials are automatically injected via IRSA
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "2000m"
        livenessProbe:
          exec:
            command:
            - python
            - -c
            - "import redis; r = redis.Redis(host='REDIS_HOST', port=6379); r.ping()"
          initialDelaySeconds: 30
          periodSeconds: 30
